<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Game Đào Coin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  body { 
    background-color: #0f172a; 
    color: white; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    height: 100vh; 
    margin: 0; 
    overflow: hidden; 
    user-select: none;
  }
  
  #balance { 
    font-size: 3.5rem; 
    font-weight: 900; 
    color: #facc15; 
    text-shadow: 0 0 20px rgba(250, 204, 21, 0.7); 
    margin-bottom: 40px; 
    letter-spacing: 2px;
  }

  #coin { 
    width: 220px; 
    height: 220px; 
    background: radial-gradient(circle, #fde047 0%, #ca8a04 80%); 
    border-radius: 50%; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-size: 6rem; 
    color: #854d0e; 
    font-weight: bold; 
    box-shadow: 0 15px 35px rgba(234, 179, 8, 0.4), inset 0 -10px 20px rgba(133, 77, 14, 0.5); 
    transition: transform 0.05s; 
    position: relative;
  }
  #coin:active { transform: scale(0.92); box-shadow: 0 5px 15px rgba(234, 179, 8, 0.4); }

  .progress-container { 
    width: 85%; 
    background: #1e293b; 
    border-radius: 20px; 
    margin-top: 50px; 
    height: 25px; 
    border: 3px solid #334155; 
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
  }
  .progress-bar { 
    width: 100%; 
    height: 100%; 
    background: linear-gradient(90deg, #eab308, #facc15); 
    border-radius: 15px; 
    transition: width 0.2s; 
  }
  #energy-text { 
    margin-top: 15px; 
    font-weight: bold; 
    color: #fbd38d; 
    font-size: 1.2rem;
  }

  /* Nút Chém Gió */
  .community-btn {
    margin-top: 30px; 
    background: #2563eb; 
    color: white; 
    border: none; 
    padding: 12px 30px; 
    font-size: 1.1rem; 
    font-weight: bold; 
    border-radius: 10px; 
    cursor: pointer; 
    box-shadow: 0 4px 10px rgba(37, 99, 235, 0.4);
    transition: transform 0.1s;
  }
  .community-btn:active { transform: scale(0.95); }

  #modal { 
    display: none; 
    position: fixed; 
    top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(0,0,0,0.85); 
    z-index: 1000; 
    align-items: center; justify-content: center; 
    backdrop-filter: blur(5px);
  }
  .modal-content { 
    background: #1e293b; 
    border: 2px solid #eab308; 
    border-radius: 25px; 
    padding: 30px 20px; 
    text-align: center; 
    width: 85%; max-width: 350px; 
    box-shadow: 0 0 40px rgba(234, 179, 8, 0.3); 
    animation: popUp 0.3s ease-out;
  }
  @keyframes popUp { 0% { transform: scale(0.8); opacity: 0;} 100% { transform: scale(1); opacity: 1;} }
  .modal-content h2 { color: #f8fafc; margin-top: 0; font-size: 1.6rem; }
  .modal-content p { color: #cbd5e1; font-size: 1.1rem; }
  .earned-amount { font-size: 2.5rem; color: #facc15; font-weight: bold; margin: 20px 0; text-shadow: 0 0 10px rgba(250, 204, 21, 0.5); }
  .claim-btn { 
    background: linear-gradient(180deg, #fde047 0%, #eab308 100%); 
    color: #000; border: none; padding: 15px 40px; font-size: 1.3rem; 
    font-weight: 900; border-radius: 15px; cursor: pointer; width: 90%; 
    box-shadow: 0 5px 15px rgba(234, 179, 8, 0.4);
  }
  .claim-btn:active { transform: scale(0.95); }

  .float-text {
    position: absolute; color: white; font-size: 2rem; font-weight: bold; pointer-events: none;
    text-shadow: 0 0 5px rgba(0,0,0,0.5);
    animation: floatUp 0.6s ease-out forwards;
  }
  @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-70px); } }
</style>
</head>
<body>

<div id="balance">Đang tải...</div>

<div id="coin">$</div>

<div class="progress-container">
  <div class="progress-bar" id="energy-bar"></div>
</div>
<div id="energy-text">⚡ ... / ...</div>

<button class="community-btn" onclick="window.open('https://t.me/+N_tRE_tAY8JhZTBl', '_blank')">
  💬 Tham Gia Nhóm Chém Gió
</button>

<div id="modal">
  <div class="modal-content">
    <h2>Chào mừng trở lại! 🥳</h2>
    <p>Máy cày tự động đã kiếm được:</p>
    <div class="earned-amount">+<span id="offline-coins">0</span> xu</div>
    <button class="claim-btn" onclick="closeModal()">Nhận Xu</button>
  </div>
</div>

<script>
  const API_URL = "https://taptoearn-backend.congle4443.workers.dev"; 
  const tg = window.Telegram.WebApp;
  tg.expand();

  let balance = 0;
  let energy = 1000;
  let maxEnergy = 1000;
  let tapLevel = 1;
  let tg_id = "nguoi_choi_test";
  let tg_name = "Guest";
  let initData = "";

  if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
      tg_id = tg.initDataUnsafe.user.id.toString();
      tg_name = tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name;
      initData = tg.initData;
  }

  function updateUI() {
      document.getElementById('balance').innerText = Math.floor(balance).toLocaleString('vi-VN');
      document.getElementById('energy-text').innerText = `⚡ ${Math.floor(energy)} / ${maxEnergy}`;
      document.getElementById('energy-bar').style.width = `${(energy / maxEnergy) * 100}%`;
  }

  async function syncData() {
      try {
          const res = await fetch(API_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ action: "sync", tg_id, tg_name, initData })
          });
          const data = await res.json();
          if (data.success) {
              balance = data.user.balance;
              energy = data.user.energy;
              maxEnergy = data.user.max_energy;
              tapLevel = data.user.tap_level || 1;
              
              if (data.idle_earned && data.idle_earned > 0) {
                  document.getElementById('offline-coins').innerText = Math.floor(data.idle_earned).toLocaleString('vi-VN');
                  document.getElementById('modal').style.display = 'flex';
              }
              updateUI();
          }
      } catch (e) {
          console.error("Lỗi đồng bộ:", e);
      }
  }

  function closeModal() {
      document.getElementById('modal').style.display = 'none';
      if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  }

  let tapTimeout;
  let tapCount = 0;

  document.getElementById('coin').addEventListener('pointerdown', (e) => {
      if (energy >= tapLevel) {
          energy -= tapLevel;
          balance += tapLevel; 
          tapCount += tapLevel;
          updateUI();
          
          if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

          const floatText = document.createElement('div');
          floatText.className = 'float-text';
          floatText.innerText = `+${tapLevel}`;
          floatText.style.left = `${e.clientX - 15}px`;
          floatText.style.top = `${e.clientY - 20}px`;
          document.body.appendChild(floatText);
          setTimeout(() => floatText.remove(), 600);

          clearTimeout(tapTimeout);
          tapTimeout = setTimeout(sendTaps, 800);
      }
  });

  async function sendTaps() {
      if (tapCount === 0) return;
      const currentTaps = tapCount;
      tapCount = 0;
      try {
          const res = await fetch(API_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ action: "tap", taps: currentTaps, tg_id, tg_name, initData })
          });
          const data = await res.json();
          if (data.success) {
              balance = data.user.balance;
              energy = data.user.energy;
              updateUI();
          }
      } catch (e) {
          console.error("Lỗi gửi xu:", e);
      }
  }

  setInterval(() => {
      if (energy < maxEnergy) {
          energy += 1;
          updateUI();
      }
  }, 1000);

  syncData();
</script>
</body>
</html>
