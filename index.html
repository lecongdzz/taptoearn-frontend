<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tap to Earn V2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; user-select: none; }
        #balance { font-size: 3.5rem; font-weight: bold; margin-bottom: 40px; text-shadow: 0 0 10px #eab308; }
        #coin { width: 220px; height: 220px; margin-bottom: 50px; transition: transform 0.05s; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        #coin:active { transform: scale(0.95); }
        .energy-container { width: 85%; background: #334155; border-radius: 15px; padding: 4px; box-shadow: inset 0 0 5px rgba(0,0,0,0.5); }
        .energy-bar { height: 24px; background: linear-gradient(90deg, #facc15, #f59e0b); border-radius: 12px; width: 100%; transition: width 0.2s ease-out; }
        .energy-text { margin-top: 10px; font-size: 1.2rem; font-weight: bold; color: #cbd5e1; }
        .floating-number { position: absolute; color: #4ade80; font-size: 2rem; font-weight: bold; pointer-events: none; animation: floatUp 0.8s ease-out forwards; text-shadow: 0 0 5px #22c55e; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }
        /* Hộp quà offline */
        #idle-modal { display: none; position: absolute; top: 30%; background: #1e293b; padding: 30px; border-radius: 20px; border: 2px solid #facc15; text-align: center; z-index: 10; box-shadow: 0 0 20px rgba(250, 204, 21, 0.3); }
        #idle-modal h2 { margin-top: 0; color: #f8fafc; }
        #idle-modal button { margin-top: 15px; padding: 12px 30px; background: #facc15; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
    </style>
</head>
<body>
    <div id="idle-modal">
        <h2>Chào mừng trở lại! 🥳</h2>
        <p>Máy cày tự động đã kiếm được:</p>
        <h3 id="idle-amount" style="color: #facc15; font-size: 2rem; margin: 10px 0;">0 xu</h3>
        <button onclick="document.getElementById('idle-modal').style.display='none'">Nhận Xu</button>
    </div>

    <div id="balance">Đang tải...</div>

    <svg id="coin" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="48" fill="#eab308" stroke="#ca8a04" stroke-width="2"/>
        <circle cx="50" cy="50" r="40" fill="#facc15"/>
        <text x="50" y="68" font-size="50" text-anchor="middle" fill="#ca8a04" font-weight="bold">$</text>
    </svg>

    <div class="energy-container">
        <div id="energy-bar" class="energy-bar"></div>
    </div>
    <div class="energy-text">⚡ <span id="energy-text">1000</span> / 1000</div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        // Link Backend của bạn đã được gắn chuẩn
        const BACKEND_URL = "https://taptoearn-backend.congle4443.workers.dev";
        
        // Lấy ID người chơi từ Telegram (hoặc dùng test nếu mở trình duyệt thường)
        const user = tg.initDataUnsafe?.user || { id: "nguoi_choi_test", first_name: "Test" };
        
        let balance = 0;
        let energy = 1000;
        let maxEnergy = 1000;
        let pendingTaps = 0;
        let syncTimer = null;

        const balanceEl = document.getElementById('balance');
        const energyBarEl = document.getElementById('energy-bar');
        const energyTextEl = document.getElementById('energy-text');
        const coinEl = document.getElementById('coin');

        function updateUI() {
            balanceEl.innerText = balance.toLocaleString();
            energyTextEl.innerText = energy;
            let pct = (energy / maxEnergy) * 100;
            energyBarEl.style.width = Math.max(0, Math.min(100, pct)) + '%';
        }

        async function sendRequest(action, taps = 0) {
            try {
                let res = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: action, tg_id: user.id.toString(), tg_name: user.first_name, taps: taps })
                });
                let data = await res.json();
                if(data.success) {
                    balance = data.user.balance;
                    energy = data.user.energy;
                    updateUI();
                    
                    if(action === 'sync' && data.idle_earned > 0) {
                        document.getElementById('idle-amount').innerText = "+" + data.idle_earned.toLocaleString() + " xu";
                        document.getElementById('idle-modal').style.display = 'block';
                    }
                }
            } catch(e) { console.log("Lỗi mạng:", e); }
        }

        // Tự động hỏi số dư khi mở app
        sendRequest('sync');

        // Bấm xu
        coinEl.addEventListener('pointerdown', (e) => {
            if (energy > 0) {
                energy--;
                balance++;
                pendingTaps++;
                updateUI();

                const rect = coinEl.getBoundingClientRect();
                const plusOne = document.createElement('div');
                plusOne.classList.add('floating-number');
                plusOne.innerText = '+1';
                plusOne.style.left = `${e.clientX - 10}px`;
                plusOne.style.top = `${e.clientY - 20}px`;
                document.body.appendChild(plusOne);
                setTimeout(() => plusOne.remove(), 800);

                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

                clearTimeout(syncTimer);
                syncTimer = setTimeout(() => {
                    sendRequest('tap', pendingTaps);
                    pendingTaps = 0;
                }, 500); // Gửi gộp sau nửa giây để tránh lag server
            }
        });

        // Hồi năng lượng tự động hiển thị mượt trên màn hình
        setInterval(() => {
            if(energy < maxEnergy) {
                energy++;
                updateUI();
            }
        }, 1000);
    </script>
</body>
</html>
