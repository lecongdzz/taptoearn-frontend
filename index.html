<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Game Tap To Earn</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #22c55e;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        .header { font-size: 22px; font-weight: bold; color: #ffffff; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px;}
        .username { font-size: 16px; color: #94a3b8; margin-bottom: 20px;}
        .score-container { font-size: 55px; font-weight: bold; margin-bottom: 50px; text-shadow: 0 0 15px #22c55e; }
        .coin {
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, #fbbf24, #b45309);
            border-radius: 50%;
            box-shadow: 0 10px 40px rgba(245, 158, 11, 0.6), inset 0 0 20px rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            cursor: pointer;
            transition: transform 0.05s;
        }
        .coin:active { 
            transform: scale(0.93); 
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4), inset 0 0 10px rgba(255,255,255,0.2); 
        }
    </style>
</head>
<body>

    <div class="header">HỆ THỐNG ĐÀO XU</div>
    <div class="username" id="playerName">Đang tải radar...</div>
    <div class="score-container" id="scoreDisplay">0</div>
    
    <div class="coin" id="coinButton">⚡</div>

    <script>
        let score = 0;
        const scoreDisplay = document.getElementById('scoreDisplay');
        const coinButton = document.getElementById('coinButton');
        const playerNameDisplay = document.getElementById('playerName');

        // Bật radar Telegram
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand(); // Ép game hiển thị full màn hình
        
        // Quét lấy Tên và ID của người chơi
        const user = window.Telegram.WebApp.initDataUnsafe.user;
        const tg_id = user ? user.id : '123456';
        const tg_name = user ? user.first_name : 'Khách Ẩn Danh';
        
        playerNameDisplay.innerText = "Thợ mỏ: " + tg_name;

        // ==========================================
        // MẢNH GHÉP 2: DÁN LINK API BACKEND VÀO ĐÂY
        // ==========================================
        const api_url = "DÁN_LINK_BACKEND_CỦA_BẠN_VÀO_ĐÂY";

        // Xử lý khi bấm đồng xu
        coinButton.addEventListener('click', () => {
            if (navigator.vibrate) navigator.vibrate(40);
            
            // 1. Cộng điểm hiển thị trên màn hình
            score++;
            scoreDisplay.innerText = score;

            // 2. Bắn tín hiệu ngầm về Dạ dày D1
            if (api_url !== "DÁN_LINK_BACKEND_CỦA_BẠN_VÀO_ĐÂY") {
                fetch(api_url + "?id=" + tg_id + "&name=" + tg_name, {
                    method: "GET",
                    mode: "no-cors"
                }).catch(err => console.log("Lỗi mạng"));
            }
        });
    </script>
</body>
</html>
